version: "3.8"

services:
  mysql-autodpro: # server name
    image: mysql:8.0
    container_name: autodpro_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword # password for root user
      MYSQL_DATABASE: autodpro # name of the database to create 
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
  phpmyadmin:
      image: phpmyadmin:latest
      container_name: autodpro_phpmyadmin
      restart: always
      depends_on:
        - mysql-autodpro
      environment:
        PMA_HOST: mysql-autodpro
        PMA_PORT: 3306
        # This allows you to log in without a "Server" prompt
        PMA_ARBITRARY: 1 
      ports:
        - "8080:80"

volumes:
  mysql-data:
